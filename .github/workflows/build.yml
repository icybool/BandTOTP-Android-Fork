name: Build and Sign APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 2. 设置 JDK
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # 3. 设置 Gradle 缓存
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    # 4. 修复 build.gradle 中的路径问题（动态替换）
    - name: Fix build.gradle paths
      run: |
        # 备份原文件
        cp app/build.gradle app/build.gradle.bak
        # 替换 Windows 路径为 Linux 路径
        sed -i 's|E:\\android\\lst.jks|./keystore.jks|g' app/build.gradle
        # 如果 compileSdkVersion 缺失，添加它（先检查）
        if ! grep -q "compileSdkVersion" app/build.gradle; then
          sed -i '/android {/a \    compileSdkVersion 34' app/build.gradle
        fi
        echo "Fixed build.gradle"
        cat app/build.gradle | grep -E "(compileSdkVersion|storeFile)" || true
    
    # 5. 创建密钥库文件
    - name: Create Keystore
      env:
        SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > keystore.jks
          echo "Keystore created at $(pwd)/keystore.jks"
          ls -la keystore.jks
        else
          echo "Warning: SIGNING_KEYSTORE_BASE64 is not set, creating debug keystore"
          keytool -genkey -v -keystore keystore.jks -alias debug -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US" -storepass android -keypass android
        fi
    
    # 6. 设置 Gradle 权限
    - name: Make Gradlew executable
      run: chmod +x gradlew
    
    # 7. 编译并签名 Release APK
    - name: Build and Sign Release APK
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
          -Pandroid.injected.signing.store.password=${{ secrets.SIGNING_STORE_PASSWORD || 'android' }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.SIGNING_KEY_ALIAS || 'debug' }} \
          -Pandroid.injected.signing.key.password=${{ secrets.SIGNING_KEY_PASSWORD || 'android' }} \
          --warning-mode all
      env:
        # 如果 Secrets 未设置，使用默认调试值
        ORG_GRADLE_PROJECT_android.injected.signing.store.file: $(pwd)/keystore.jks
    
    # 8. 上传签名后的 APK
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: signed-app-release
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/*/release/*.apk
        retention-days: 30
    
    # 9. 编译 Debug APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug --warning-mode all
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/*/debug/*.apk
        retention-days: 7
