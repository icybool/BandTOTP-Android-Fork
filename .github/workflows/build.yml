name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
    
    # 核心修复：修复 build.gradle 中的所有问题
    - name: Fix build.gradle completely
      run: |
        echo "=== Original build.gradle (first 30 lines) ==="
        head -30 app/build.gradle
        
        # 1. 删除或注释掉包含 Windows 路径的行
        sed -i '/E:\\android\\/d' app/build.gradle
        sed -i '/lst.jks/d' app/build.gradle
        
        # 2. 添加缺失的 compileSdk
        # 检查是否有 compileSdk 或 compileSdkVersion
        if ! grep -q "compileSdk" app/build.gradle; then
          # 在 android { 后面添加 compileSdk 34
          sed -i '/android {/a \    compileSdk 34' app/build.gradle
          echo "Added compileSdk 34"
        fi
        
        # 3. 确保 targetSdk 和 minSdk 也存在（如果需要）
        if ! grep -q "targetSdk" app/build.gradle; then
          sed -i '/compileSdk/a \    targetSdk 34' app/build.gradle
        fi
        if ! grep -q "minSdk" app/build.gradle; then
          sed -i '/targetSdk/a \    minSdk 21' app/build.gradle
        fi
        
        # 4. 如果 signingConfigs 块有问题，整个注释掉
        sed -i '/signingConfigs {/,/}/ {
          s/signingConfigs {/\/\/ signingConfigs {/
          s/}/\/\/ }/
        }' app/build.gradle
        
        echo "=== Fixed build.gradle ==="
        cat app/build.gradle
    
    - name: Make Gradlew executable
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
  
