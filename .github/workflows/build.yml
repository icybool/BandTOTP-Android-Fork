name: Build and Sign APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    # 关键步骤：修复 build.gradle 中的 Windows 路径
    - name: Fix build.gradle - Remove Windows path
      run: |
        echo "Before fix:"
        grep -n "lst.jks" app/build.gradle || echo "Pattern not found"
        
        # 方法1：直接注释掉或删除包含 Windows 路径的行
        sed -i 's|.*E:\\android\\lst.jks.*|            // storeFile file("E:\\android\\lst.jks") - Fixed by CI|g' app/build.gradle
        
        # 方法2：替换为有效路径（可选）
        # sed -i 's|E:\\android\\lst.jks|./keystore.jks|g' app/build.gradle
        
        echo "After fix:"
        grep -n "lst.jks" app/build.gradle || echo "Pattern fixed successfully"
        
        # 显示修复后的相关行
        echo "Relevant lines after fix:"
        sed -n '10,20p' app/build.gradle
    
    # 创建密钥库（用于后续签名）
    - name: Create Keystore
      env:
        SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > keystore.jks
          echo "Keystore created from secret"
        else
          # 创建调试密钥库
          keytool -genkey -v -keystore keystore.jks -alias debug -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US" -storepass android -keypass android -noprompt
          echo "Debug keystore created"
        fi
        ls -la keystore.jks
    
    - name: Make Gradlew executable
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Build Release APK (with signature override)
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
          -Pandroid.injected.signing.store.password=${{ secrets.SIGNING_STORE_PASSWORD || 'android' }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.SIGNING_KEY_ALIAS || 'debug' }} \
          -Pandroid.injected.signing.key.password=${{ secrets.SIGNING_KEY_PASSWORD || 'android' }} \
          --stacktrace
      continue-on-error: true  # 即使 release 失败也继续
    
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: built-apks
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/*/debug/*.apk
          app/build/outputs/apk/*/release/*.apk
        retention-days: 30
