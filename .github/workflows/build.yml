name: Build APK (No File Modification)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
    
    - name: Make Gradlew executable
      run: chmod +x gradlew
    
    # 使用命令行参数覆盖所有配置，完全不修改文件
    - name: Build APK with overrides
      run: |
        ./gradlew assembleDebug \
          -Pandroid.compileSdkVersion=34 \
          -Pandroid.minSdkVersion=21 \
          -Pandroid.targetSdkVersion=34 \
          --stacktrace \
          --info
      continue-on-error: true
    
    # 如果上面的失败，尝试只编译特定的任务
    - name: Build APK (alternative)
      if: failure()
      run: |
        # 尝试只编译，忽略签名错误
        ./gradlew :app:compileDebugSources --stacktrace || true
        ./gradlew :app:packageDebug --stacktrace
    
    - name: Find and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          app/build/outputs/apk/**/*.apk
          **/build/outputs/apk/**/*.apk
        retention-days: 30
        if-no-files-found: warn
  
